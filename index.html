body {
  font-family: "Zen Maru Gothic", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,140,155,0.55), transparent 35%),
    radial-gradient(circle at bottom right, rgba(181,235,250,0.75), transparent 40%),
    linear-gradient(135deg, #fff7f9, #eefbff);
  padding: 24px;
  color: #333;
}

h1 {
  margin-top: 40px;
  margin-bottom: 20px;
  color: #444;
  font-weight: 800;
  letter-spacing: 1px;
}

    .container {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      flex-wrap: wrap;
  justify-content: center;
}


.card {
  width: 260px;
  background: linear-gradient(180deg, #ffffff, #fdfdfd);
  border-radius: 22px;
  padding: 14px;
  box-shadow: 0 10px 24px rgba(181,235,250,0.7);
  transition: all 0.25s;

   opacity: 0;                 
  transform: translateY(20px);
  animation:
  fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards,
  floaty 3s ease-in-out infinite;
}
.card:hover {
  transform: translateY(-14px) scale(1.06);
}
.card:active {
  transform: scale(0.96);
}

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card a {
      color: black;
      text-decoration: none;
    }

    .card p {
      font-size: 16px;
      font-weight: bold;
    }
    .year {
  color: #FF8C9B;
  font-size: 14px;
  margin-bottom: 4px;
}


button {
  padding: 10px 16px;
  margin: 6px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, #b5ebfa, #ffffff);
  color: #333;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 4px 10px rgba(181,235,250,0.6);
}

button:hover {
  background: linear-gradient(135deg, #FF8C9B, #ffb6c1);
  color: white;
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 16px rgba(255,140,155,0.5);
}
button.active {
  background: linear-gradient(135deg, #FF8C9B, #ff6f91);
  color: white;
  box-shadow: 0 6px 18px rgba(255,140,155,0.6);
}
button:active {
  transform: scale(0.92);
}
#search {
  width: 250px;
  padding: 10px;
  margin: 10px 0;
  border-radius: 999px;
  border: none;
  outline: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
#search {
  transition: 0.2s;
}

#search:focus {
  box-shadow: 0 4px 12px rgba(255,140,155,0.4);
}
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@keyframes floaty {
  0% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}
@media (max-width: 600px) {
  body {
    padding: 16px;
  }

  h1 {
    font-size: 24px;
  }

  #search {
    width: 100%;
    box-sizing: border-box;
  }

  button {
    padding: 8px 12px;
    font-size: 14px;
  }

  .card {
    width: 100%;
    max-width: 320px;
  }

  .container {
    justify-content: center;
  }
}

    function getVideoId(video) {
  if (video.videoId) {
    return video.videoId;
  }

  const url = new URL(video.url);

  if (url.pathname.startsWith("/live/")) {
    return url.pathname.split("/live/")[1];
  }

  return url.searchParams.get("v");
}

function showDate(month, day) {
  const sections = document.querySelectorAll("h1");
  let found = false;

  sections.forEach(function(title) {
    if (title.textContent.includes("の配信")) {
if (title.textContent === month + "/" + day + "の配信") {
        title.style.display = "block";
        title.nextElementSibling.style.display = "flex";
        found = true;
      } else {
        title.style.display = "none";
        title.nextElementSibling.style.display = "none";
      }
    }
  });

  const oldMsg = document.getElementById("no-video-message");
  if (oldMsg) {
    oldMsg.remove();
  }

  if (!found) {
    const msg = document.createElement("p");
    msg.id = "no-video-message";
    msg.textContent = "この日の配信はありません";
    app.appendChild(msg);
  }

  document.querySelectorAll("button").forEach(function(btn) {
    btn.classList.remove("active");
  });

  const id = "btn-" + month + day;
  const activeBtn = document.getElementById(id);

  if (activeBtn) {
    activeBtn.classList.add("active");
  }
}

document.getElementById("search").addEventListener("input", function(e) {
  const keyword = e.target.value.toLowerCase();

  const sections = document.querySelectorAll("h1");

  sections.forEach(function(title) {
    if (title.textContent.includes("の配信")) {
      const container = title.nextElementSibling;
      const cards = container.querySelectorAll(".card");

      let hasMatch = false;

      cards.forEach(function(card) {
        const text = card.textContent.toLowerCase();

        if (text.includes(keyword)) {
          card.style.display = "block";
          hasMatch = true;
        } else {
          card.style.display = "none";
        }
      });

      if (keyword === "") {
        title.style.display = "block";
        container.style.display = "flex";
        cards.forEach(card => card.style.display = "block");
      } else {
        if (hasMatch) {
          title.style.display = "block";
          container.style.display = "flex";
        } else {
          title.style.display = "none";
          container.style.display = "none";
        }
      }
    }
  });
});
function showAllVideos() {
  const sections = document.querySelectorAll("h1");

  sections.forEach(function(title) {
    if (title.textContent.includes("の配信")) {
      title.style.display = "block";
      title.nextElementSibling.style.display = "flex";
    }
  });
}
function filterByYear(year) {
  const sections = document.querySelectorAll("h1");

  sections.forEach(function(title) {
    if (title.textContent.includes("の配信")) {
      const container = title.nextElementSibling;
      const cards = container.querySelectorAll(".card");

      let hasMatch = false;

      cards.forEach(function(card) {
        if (card.textContent.includes(year)) {
          card.style.display = "block";
          hasMatch = true;
        } else {
          card.style.display = "none";
        }
      });

      if (hasMatch) {
        title.style.display = "block";
        container.style.display = "flex";
      } else {
        title.style.display = "none";
        container.style.display = "none";
      }
    }
  });
}
